<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信源解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }

        /* 为拼图块预览创建一个小网格 */
        .piece-preview {
            display: grid;
            grid-template-columns: repeat(4, 10px);
            grid-template-rows: repeat(4, 10px);
            gap: 1px;
        }

        .piece-preview-cell {
            width: 10px;
            height: 10px;
        }

        /* 防止数字输入框出现上下箭头 */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* 网格格子样式 */
        .grid-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #1f2937;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <div class="container mx-auto p-4 md:p-8 max-w-6xl">
        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">网格设置</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-1">行数</label>
                        <input type="number" id="grid-rows" min="1" max="10" value="5"
                               class="w-full text-center p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">列数</label>
                        <input type="number" id="grid-cols" min="1" max="10" value="6"
                               class="w-full text-center p-2 border rounded-md">
                    </div>
                </div>

                <h2 class="text-xl font-bold mb-4 border-b pb-2">设置拼图块数量</h2>
                <div id="piece-controls" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-2 gap-4">
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold mb-4">点击网格设置形状</h2>
                <div id="grid-container"
                    class="aspect-[6/5] max-w-md mx-auto grid grid-cols-6 gap-1.5 bg-slate-200 p-2 rounded-lg mb-6">
                </div>

                <!-- 控制中心 -->
                <h2 class="text-xl font-bold mb-4 border-b pb-2">控制中心</h2>
                <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                    <button id="solve-button"
                        class="w-full sm:w-auto bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                        开始搜索
                    </button>
                    <button id="reset-button"
                        class="w-full sm:w-auto bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg hover:bg-slate-300 transition-colors duration-300">
                        重置面板
                    </button>
                </div>
                <div id="message-area" class="mt-6 text-center"></div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
